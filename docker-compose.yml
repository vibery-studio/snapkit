services:
  server:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./brands:/app/brands
      - ./data:/app/data
      - ./app/public/fonts:/app/fonts
    environment:
      - SNAPKIT_ROOT=/app
      - GIN_MODE=release

  app:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - /app/node_modules
    depends_on:
      - server
