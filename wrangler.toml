name = "snapkit"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[dev]
port = 8787

[assets]
directory = "./public"

# R2 bucket for designs, backgrounds, brand assets
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "snapkit-storage"

# Environment variables (set via wrangler secret)
# UNSPLASH_ACCESS_KEY - for image search
# WINDMILL_BASE - for server-side generation
# WINDMILL_TOKEN - for server-side generation
